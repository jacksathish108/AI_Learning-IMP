<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Job Hunt Agent — Sathishkumar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0c10;
  --bg2:      #111318;
  --bg3:      #181c24;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #e8eaf0;
  --muted:    #6b7280;
  --accent:   #6c63ff;
  --accent2:  #4ade80;
  --warn:     #f59e0b;
  --danger:   #f87171;
  --teal:     #2dd4bf;
  --mono:     'DM Mono', monospace;
  --sans:     'Sora', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; min-height:100vh; }

/* ── Layout ── */
.shell { display:grid; grid-template-columns:220px 1fr; min-height:100vh; }
.sidebar { background:var(--bg2); border-right:1px solid var(--border); padding:24px 0; display:flex; flex-direction:column; }
.main { display:flex; flex-direction:column; overflow:hidden; }

/* ── Sidebar ── */
.logo { padding:0 20px 24px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.logo-title { font-size:13px; font-weight:600; color:var(--accent); letter-spacing:.08em; text-transform:uppercase; }
.logo-sub { font-size:11px; color:var(--muted); margin-top:3px; font-family:var(--mono); }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 20px; cursor:pointer; font-size:13px; color:var(--muted); border-left:2px solid transparent; transition:all .15s; }
.nav-item:hover { color:var(--text); background:rgba(255,255,255,.03); }
.nav-item.active { color:var(--text); border-left-color:var(--accent); background:rgba(108,99,255,.08); }
.nav-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; }
.nav-item.active .nav-dot { background:var(--accent); }
.nav-badge { margin-left:auto; font-size:10px; font-family:var(--mono); background:rgba(245,158,11,.15); color:var(--warn); padding:2px 6px; border-radius:10px; }
.sidebar-bottom { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border); }
.status-row { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); font-family:var(--mono); }
.pulse { width:6px; height:6px; border-radius:50%; background:var(--accent2); flex-shrink:0; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Topbar ── */
.topbar { display:flex; align-items:center; gap:12px; padding:16px 28px; border-bottom:1px solid var(--border); background:var(--bg2); }
.topbar-title { font-size:15px; font-weight:500; flex:1; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:7px; border:1px solid var(--border2); background:transparent; color:var(--text); font-family:var(--sans); font-size:12px; cursor:pointer; transition:all .15s; }
.btn:hover { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.2); }
.btn-accent { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-accent:hover { background:#5a52e0; border-color:#5a52e0; }
.btn-sm { padding:5px 10px; font-size:11px; }
.btn-green { background:rgba(74,222,128,.1); border-color:rgba(74,222,128,.3); color:var(--accent2); }
.btn-green:hover { background:rgba(74,222,128,.2); }
.btn-red { background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.3); color:var(--danger); }
.btn-red:hover { background:rgba(248,113,113,.2); }

/* ── Content ── */
.content { padding:24px 28px; flex:1; overflow-y:auto; }

/* ── Stat cards ── */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:16px 18px; }
.stat-label { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-family:var(--mono); margin-bottom:8px; }
.stat-value { font-size:26px; font-weight:600; line-height:1; font-family:var(--mono); }
.stat-sub { font-size:11px; color:var(--muted); margin-top:5px; }
.c-accent { color:var(--accent); }
.c-green  { color:var(--accent2); }
.c-warn   { color:var(--warn); }
.c-teal   { color:var(--teal); }

/* ── Panel layout ── */
.two-col { display:grid; grid-template-columns:1fr 380px; gap:16px; }
.panel { background:var(--bg2); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.panel-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.panel-title { font-size:12px; font-weight:500; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); flex:1; font-family:var(--mono); }

/* ── Filter tabs ── */
.filter-tabs { display:flex; gap:4px; padding:12px 18px; border-bottom:1px solid var(--border); overflow-x:auto; }
.filter-tab { padding:5px 12px; border-radius:5px; font-size:11px; cursor:pointer; border:1px solid transparent; color:var(--muted); white-space:nowrap; transition:all .15s; }
.filter-tab:hover { color:var(--text); }
.filter-tab.active { background:rgba(108,99,255,.15); border-color:rgba(108,99,255,.3); color:#a5a0ff; }

/* ── Job list ── */
.job-list { max-height:520px; overflow-y:auto; }
.job-row { padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; display:grid; grid-template-columns:1fr auto; gap:8px; align-items:start; }
.job-row:hover { background:rgba(255,255,255,.02); }
.job-row.selected { background:rgba(108,99,255,.07); border-left:2px solid var(--accent); padding-left:16px; }
.job-title-row { display:flex; align-items:center; gap:8px; margin-bottom:3px; }
.job-title { font-size:13px; font-weight:500; }
.job-company { font-size:11px; color:var(--muted); font-family:var(--mono); }
.score-pill { font-size:10px; font-family:var(--mono); padding:2px 7px; border-radius:10px; font-weight:500; }
.score-high   { background:rgba(74,222,128,.12); color:var(--accent2); }
.score-mid    { background:rgba(245,158,11,.12); color:var(--warn); }
.score-low    { background:rgba(248,113,113,.12); color:var(--danger); }
.status-badge { font-size:9px; font-family:var(--mono); padding:2px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:.05em; }
.s-discovered  { background:rgba(107,114,128,.15); color:var(--muted); }
.s-analyzed    { background:rgba(108,99,255,.15); color:#a5a0ff; }
.s-pending     { background:rgba(245,158,11,.15); color:var(--warn); }
.s-applied     { background:rgba(74,222,128,.12); color:var(--accent2); }
.s-low         { background:rgba(248,113,113,.1);  color:#fca5a5; }
.s-failed      { background:rgba(248,113,113,.15); color:var(--danger); }
.job-meta { font-size:10px; color:var(--muted); margin-top:4px; font-family:var(--mono); display:flex; gap:8px; }
.source-tag { font-size:9px; font-family:var(--mono); padding:1px 5px; border-radius:3px; background:rgba(45,212,191,.08); color:var(--teal); }

/* ── Detail panel ── */
.detail-body { padding:18px; overflow-y:auto; max-height:540px; }
.detail-empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:12px; }
.detail-role { font-size:16px; font-weight:600; margin-bottom:4px; }
.detail-company { font-size:12px; color:var(--muted); font-family:var(--mono); margin-bottom:16px; }
.detail-score-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.score-bar-wrap { flex:1; height:6px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden; }
.score-bar { height:100%; border-radius:3px; transition:width .4s ease; }
.section-label { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-family:var(--mono); margin-bottom:8px; margin-top:14px; }
.skill-chips { display:flex; flex-wrap:wrap; gap:5px; }
.chip { font-size:10px; font-family:var(--mono); padding:3px 8px; border-radius:4px; }
.chip-green { background:rgba(74,222,128,.1); color:var(--accent2); border:1px solid rgba(74,222,128,.2); }
.chip-red   { background:rgba(248,113,113,.1); color:var(--danger); border:1px solid rgba(248,113,113,.2); }
.chip-accent{ background:rgba(108,99,255,.1); color:#a5a0ff; border:1px solid rgba(108,99,255,.2); }
.reasoning-box { background:var(--bg3); border-radius:7px; padding:12px 14px; font-size:12px; color:#9ca3af; line-height:1.6; margin-top:8px; }
.action-row { display:flex; gap:8px; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }

/* ── Tailor panel ── */
.tailor-form { padding:18px; display:flex; flex-direction:column; gap:12px; }
textarea, input[type=text] { background:var(--bg3); border:1px solid var(--border2); border-radius:7px; color:var(--text); font-family:var(--mono); font-size:12px; padding:10px 12px; width:100%; resize:vertical; outline:none; transition:border .15s; }
textarea:focus, input[type=text]:focus { border-color:var(--accent); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-family:var(--mono); margin-bottom:4px; }
.tailor-result { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:14px; font-size:11px; font-family:var(--mono); color:#9ca3af; line-height:1.7; max-height:260px; overflow-y:auto; white-space:pre-wrap; }

/* ── Toast ── */
.toast-wrap { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:999; }
.toast { background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:10px 16px; font-size:12px; font-family:var(--mono); display:flex; align-items:center; gap:8px; animation:slideIn .2s ease; }
@keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
.toast.success { border-color:rgba(74,222,128,.3); color:var(--accent2); }
.toast.error   { border-color:rgba(248,113,113,.3); color:var(--danger); }
.toast.info    { border-color:rgba(108,99,255,.3); color:#a5a0ff; }

/* ── Loading spinner ── */
.spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,.1); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:3px; }

/* ── Empty state ── */
.empty { padding:40px; text-align:center; color:var(--muted); font-size:12px; }
.empty-icon { font-size:28px; margin-bottom:8px; opacity:.4; }
</style>
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">Job Hunt Agent</div>
      <div class="logo-sub">Sathishkumar K</div>
    </div>
    <nav>
      <div class="nav-item active" onclick="showPage('dashboard')">
        <div class="nav-dot"></div> Dashboard
      </div>
      <div class="nav-item" onclick="showPage('jobs')">
        <div class="nav-dot"></div> All Jobs
      </div>
      <div class="nav-item" id="nav-review" onclick="showPage('review')">
        <div class="nav-dot"></div> Pending Review
        <span class="nav-badge" id="review-count">0</span>
      </div>
      <div class="nav-item" onclick="showPage('tailor')">
        <div class="nav-dot"></div> Resume Tailor
      </div>
      <div class="nav-item" onclick="showPage('applied')">
        <div class="nav-dot"></div> Applied
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="status-row">
        <div class="pulse" id="api-pulse"></div>
        <span id="api-status">connecting...</span>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <button class="btn btn-sm" onclick="refreshData()">↻ Refresh</button>
      <button class="btn btn-sm btn-accent" onclick="triggerScrape()">
        <span id="scrape-spinner" style="display:none"><div class="spinner"></div></span>
        Run Scrape
      </button>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <!-- injected by JS -->
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-wrap" id="toasts"></div>

<script>
const API = 'http://localhost:8080/api';
let allJobs = [];
let selectedJob = null;
let currentPage = 'dashboard';

// ── API helpers ────────────────────────────────────────────────────────────

async function apiFetch(path, opts = {}) {
  try {
    const r = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts
    });
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch (e) {
    throw e;
  }
}

async function checkApiHealth() {
  try {
    await apiFetch('/health');
    document.getElementById('api-pulse').style.background = '#4ade80';
    document.getElementById('api-status').textContent = 'agent running';
  } catch {
    document.getElementById('api-pulse').style.background = '#f87171';
    document.getElementById('api-pulse').style.animation = 'none';
    document.getElementById('api-status').textContent = 'agent offline';
  }
}

async function refreshData() {
  try {
    allJobs = await apiFetch('/jobs');
    const stats = await apiFetch('/stats');
    const pending = allJobs.filter(j => j.status === 'PENDING_REVIEW').length;
    document.getElementById('review-count').textContent = pending;
    renderCurrentPage(stats);
  } catch (e) {
    toast('Could not reach backend — is Spring Boot running on :8080?', 'error');
  }
}

// ── Page routing ──────────────────────────────────────────────────────────

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navMap = { dashboard:0, jobs:1, review:2, tailor:3, applied:4 };
  document.querySelectorAll('.nav-item')[navMap[page]]?.classList.add('active');
  const titles = { dashboard:'Dashboard', jobs:'All Jobs', review:'Pending Review', tailor:'Resume Tailor', applied:'Applied Jobs' };
  document.getElementById('page-title').textContent = titles[page];
  refreshData();
}

function renderCurrentPage(stats) {
  const pages = { dashboard: renderDashboard, jobs: renderJobs, review: renderReview, tailor: renderTailor, applied: renderApplied };
  (pages[currentPage] || renderDashboard)(stats);
}

// ── Dashboard ─────────────────────────────────────────────────────────────

function renderDashboard(stats = {}) {
  const byStatus = stats.byStatus || {};
  const total    = stats.totalJobs || allJobs.length;
  const applied  = byStatus.APPLIED || 0;
  const pending  = byStatus.PENDING_REVIEW || 0;
  const todayApp = stats.appliedToday || 0;

  const topJobs = [...allJobs]
    .filter(j => j.matchScore)
    .sort((a,b) => b.matchScore - a.matchScore)
    .slice(0, 8);

  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Discovered</div>
        <div class="stat-value c-accent">${total}</div>
        <div class="stat-sub">across all sources</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Applied</div>
        <div class="stat-value c-green">${applied}</div>
        <div class="stat-sub">${todayApp} today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Review</div>
        <div class="stat-value c-warn">${pending}</div>
        <div class="stat-sub">awaiting your approval</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Analyzed</div>
        <div class="stat-value c-teal">${byStatus.ANALYZED || 0}</div>
        <div class="stat-sub">AI scored</div>
      </div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Top Matched Jobs</div>
        </div>
        <div class="job-list">
          ${topJobs.length ? topJobs.map(j => jobRowHtml(j)).join('') : '<div class="empty"><div class="empty-icon">○</div>No jobs yet — run a scrape</div>'}
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Status Breakdown</div>
        </div>
        <div style="padding:18px">
          ${Object.entries(byStatus).map(([s, c]) => `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
              <span class="status-badge ${statusClass(s)}">${s.replace('_',' ')}</span>
              <div style="flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden">
                <div style="height:100%;background:${statusColor(s)};width:${Math.min(100,(c/Math.max(total,1))*100)}%;border-radius:2px;transition:width .5s"></div>
              </div>
              <span style="font-family:var(--mono);font-size:11px;color:var(--muted);min-width:20px;text-align:right">${c}</span>
            </div>
          `).join('') || '<div style="color:var(--muted);font-size:12px">No data yet</div>'}
        </div>
      </div>
    </div>
  `;
  attachJobRowListeners();
}

// ── Jobs page ─────────────────────────────────────────────────────────────

function renderJobs(stats, filter = 'ALL') {
  const filters = ['ALL','DISCOVERED','ANALYZED','PENDING_REVIEW','APPLIED','SCORE_TOO_LOW','FAILED'];
  const filtered = filter === 'ALL' ? allJobs : allJobs.filter(j => j.status === filter);
  const sorted = [...filtered].sort((a,b) => (b.matchScore||0) - (a.matchScore||0));

  document.getElementById('content').innerHTML = `
    <div class="two-col">
      <div class="panel">
        <div class="filter-tabs">
          ${filters.map(f => `<div class="filter-tab ${f===filter?'active':''}" onclick="filterJobs('${f}')">${f.replace('_',' ')} <span style="opacity:.5">${f==='ALL'?allJobs.length:allJobs.filter(j=>j.status===f).length}</span></div>`).join('')}
        </div>
        <div class="job-list">
          ${sorted.length ? sorted.map(j => jobRowHtml(j)).join('') : '<div class="empty"><div class="empty-icon">○</div>No jobs in this category</div>'}
        </div>
      </div>
      <div class="panel" id="detail-panel">
        <div class="panel-header"><div class="panel-title">Job Detail</div></div>
        <div class="detail-empty">Select a job to view details</div>
      </div>
    </div>
  `;
  attachJobRowListeners();
  if (selectedJob) renderDetail(selectedJob);
}

window._jobFilter = 'ALL';
function filterJobs(f) { window._jobFilter = f; renderJobs(null, f); }

// ── Review page ───────────────────────────────────────────────────────────

function renderReview() {
  const jobs = allJobs.filter(j => j.status === 'PENDING_REVIEW').sort((a,b) => (b.matchScore||0) - (a.matchScore||0));
  document.getElementById('content').innerHTML = `
    <div class="two-col">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Awaiting Approval (${jobs.length})</div>
        </div>
        <div class="job-list">
          ${jobs.length ? jobs.map(j => jobRowHtml(j)).join('') : '<div class="empty"><div class="empty-icon">✓</div>All caught up — no pending reviews</div>'}
        </div>
      </div>
      <div class="panel" id="detail-panel">
        <div class="panel-header"><div class="panel-title">Job Detail</div></div>
        <div class="detail-empty">Select a job to approve or skip</div>
      </div>
    </div>
  `;
  attachJobRowListeners();
}

// ── Applied page ──────────────────────────────────────────────────────────

function renderApplied() {
  const jobs = allJobs.filter(j => j.status === 'APPLIED').sort((a,b) => new Date(b.appliedAt||0) - new Date(a.appliedAt||0));
  document.getElementById('content').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Applied Jobs (${jobs.length})</div>
      </div>
      <div class="job-list">
        ${jobs.length ? jobs.map(j => `
          <div class="job-row" onclick="selectJob('${j.id}')">
            <div>
              <div class="job-title-row">
                <span class="job-title">${j.title}</span>
                ${scoreChip(j.matchScore)}
              </div>
              <div class="job-company">${j.company}</div>
              <div class="job-meta">
                <span class="source-tag">${j.source||'?'}</span>
                <span>${j.location||''}</span>
                <span>${j.appliedAt ? new Date(j.appliedAt).toLocaleDateString() : ''}</span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
              <span class="status-badge s-applied">applied</span>
              ${j.recruiterEmail ? '<span style="font-size:9px;color:var(--muted);font-family:var(--mono)">follow-up set</span>' : ''}
            </div>
          </div>
        `).join('') : '<div class="empty"><div class="empty-icon">○</div>No applications yet</div>'}
      </div>
    </div>
  `;
}

// ── Tailor page ───────────────────────────────────────────────────────────

function renderTailor() {
  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">Paste a Job Description</div></div>
        <div class="tailor-form">
          <div class="form-row">
            <div>
              <div class="form-label">Job Title</div>
              <input type="text" id="t-title" placeholder="Senior Backend Engineer"/>
            </div>
            <div>
              <div class="form-label">Company</div>
              <input type="text" id="t-company" placeholder="Flipkart"/>
            </div>
          </div>
          <div>
            <div class="form-label">Location</div>
            <input type="text" id="t-location" placeholder="Bangalore"/>
          </div>
          <div>
            <div class="form-label">Full Job Description</div>
            <textarea id="t-jd" rows="10" placeholder="Paste the full JD here..."></textarea>
          </div>
          <button class="btn btn-accent" onclick="runTailor()">
            <span id="tailor-spinner" style="display:none"><div class="spinner"></div></span>
            Tailor My Resume
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><div class="panel-title">AI Result</div></div>
        <div style="padding:18px" id="tailor-result-panel">
          <div class="detail-empty">Run the tailor to see results</div>
        </div>
      </div>
    </div>
  `;
}

async function runTailor() {
  const jd = document.getElementById('t-jd').value.trim();
  if (!jd) { toast('Please paste a job description first', 'error'); return; }

  const spinner = document.getElementById('tailor-spinner');
  spinner.style.display = 'inline-flex';

  try {
    const result = await apiFetch('/tailor', {
      method: 'POST',
      body: JSON.stringify({
        title:    document.getElementById('t-title').value || 'Unknown Role',
        company:  document.getElementById('t-company').value || 'Unknown Company',
        location: document.getElementById('t-location').value || 'Bangalore',
        jd
      })
    });

    document.getElementById('tailor-result-panel').innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <span style="font-size:22px;font-family:var(--mono);font-weight:600;color:${result.matchScore>=75?'var(--accent2)':result.matchScore>=60?'var(--warn)':'var(--danger)'}">${result.matchScore}%</span>
        <div>
          <div style="font-size:12px;font-weight:500">${result.priority} priority</div>
          <div style="font-size:11px;color:var(--muted)">${result.reasoning||''}</div>
        </div>
      </div>
      <div class="section-label">Keywords to highlight</div>
      <div class="skill-chips">${(result.keywordsHighlighted||[]).map(k=>`<span class="chip chip-accent">${k}</span>`).join('')}</div>
      <div class="section-label">Missing skills</div>
      <div class="skill-chips">${(result.missingSkills||[]).map(k=>`<span class="chip chip-red">${k}</span>`).join('')}</div>
      <div class="section-label" style="margin-top:14px">Tailored Resume</div>
      <div class="tailor-result">${result.tailoredResume||'No resume returned'}</div>
      <div class="section-label" style="margin-top:12px">Cover Letter</div>
      <div class="tailor-result">${result.coverLetter||'No cover letter returned'}</div>
    `;
    toast('Resume tailored successfully', 'success');
  } catch (e) {
    toast('Tailor failed — check backend is running', 'error');
  } finally {
    spinner.style.display = 'none';
  }
}

// ── Job detail ────────────────────────────────────────────────────────────

function renderDetail(job) {
  const panel = document.getElementById('detail-panel');
  if (!panel) return;
  const score = job.matchScore || 0;
  const barColor = score >= 75 ? '#4ade80' : score >= 60 ? '#f59e0b' : '#f87171';
  const matched = job.matchedSkills ? job.matchedSkills.split(', ').filter(Boolean) : [];
  const missing = job.missingSkills ? job.missingSkills.split(', ').filter(Boolean) : [];

  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-title">Job Detail</div>
      ${job.jobUrl ? `<a href="${job.jobUrl}" target="_blank" style="font-size:11px;color:var(--teal);font-family:var(--mono);text-decoration:none">↗ View JD</a>` : ''}
    </div>
    <div class="detail-body">
      <div class="detail-role">${job.title}</div>
      <div class="detail-company">${job.company} · ${job.location||'?'} · <span class="source-tag">${job.source||'?'}</span></div>

      ${score ? `
      <div class="detail-score-row">
        <span style="font-size:20px;font-weight:600;font-family:var(--mono);color:${barColor}">${score}%</span>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${score}%;background:${barColor}"></div></div>
        <span class="status-badge ${statusClass(job.status)}">${(job.status||'').replace('_',' ')}</span>
      </div>` : ''}

      ${job.aiAnalysisSummary ? `
      <div class="section-label">AI Analysis</div>
      <div class="reasoning-box">${job.aiAnalysisSummary}</div>` : ''}

      ${matched.length ? `
      <div class="section-label">Matched Skills</div>
      <div class="skill-chips">${matched.map(s=>`<span class="chip chip-green">${s}</span>`).join('')}</div>` : ''}

      ${missing.length ? `
      <div class="section-label">Missing Skills</div>
      <div class="skill-chips">${missing.map(s=>`<span class="chip chip-red">${s}</span>`).join('')}</div>` : ''}

      ${job.salaryRange ? `<div class="section-label">Salary</div><div style="font-family:var(--mono);font-size:12px;color:var(--teal)">${job.salaryRange}</div>` : ''}

      <div class="action-row">
        ${job.status === 'PENDING_REVIEW' ? `
          <button class="btn btn-green btn-sm" onclick="approveJob('${job.id}')">✓ Approve & Apply</button>
          <button class="btn btn-red btn-sm" onclick="skipJob('${job.id}')">✕ Skip</button>
        ` : ''}
        ${job.tailoredResumePath ? `<a href="${API}/jobs/${job.id}/resume" class="btn btn-sm" style="text-decoration:none">↓ Resume PDF</a>` : ''}
        ${job.coverLetterPath ? `<a href="${API}/jobs/${job.id}/cover-letter" class="btn btn-sm" style="text-decoration:none">↓ Cover Letter</a>` : ''}
        <button class="btn btn-sm" onclick="reAnalyze('${job.id}')">↻ Re-analyze</button>
      </div>

      ${job.appliedAt ? `<div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:10px">Applied: ${new Date(job.appliedAt).toLocaleString()}</div>` : ''}
    </div>
  `;
}

// ── Actions ───────────────────────────────────────────────────────────────

async function approveJob(id) {
  try {
    await apiFetch(`/jobs/${id}/approve`, { method: 'POST' });
    toast('Job approved — queued for application', 'success');
    refreshData();
  } catch { toast('Approve failed', 'error'); }
}

async function skipJob(id) {
  try {
    await apiFetch(`/jobs/${id}/skip`, { method: 'POST' });
    toast('Job skipped', 'info');
    refreshData();
  } catch { toast('Skip failed', 'error'); }
}

async function reAnalyze(id) {
  try {
    toast('Re-analyzing...', 'info');
    const result = await apiFetch(`/trigger/analyze/${id}`, { method: 'POST' });
    toast(`Re-analyzed: ${result.matchScore}% match`, 'success');
    refreshData();
  } catch { toast('Re-analysis failed', 'error'); }
}

async function triggerScrape() {
  const spinner = document.getElementById('scrape-spinner');
  spinner.style.display = 'inline-flex';
  try {
    const r = await apiFetch('/trigger/scrape', { method: 'POST' });
    toast(`Scrape complete — ${r.discovered} new jobs found`, 'success');
    refreshData();
  } catch { toast('Scrape failed — check backend', 'error'); }
  finally { spinner.style.display = 'none'; }
}

function selectJob(id) {
  selectedJob = allJobs.find(j => j.id === id);
  document.querySelectorAll('.job-row').forEach(r => r.classList.remove('selected'));
  document.querySelector(`.job-row[data-id="${id}"]`)?.classList.add('selected');
  renderDetail(selectedJob);
}

function attachJobRowListeners() {
  document.querySelectorAll('.job-row[data-id]').forEach(row => {
    row.addEventListener('click', () => selectJob(row.dataset.id));
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────

function jobRowHtml(j) {
  return `
    <div class="job-row ${selectedJob?.id===j.id?'selected':''}" data-id="${j.id}">
      <div>
        <div class="job-title-row">
          <span class="job-title">${j.title}</span>
          ${scoreChip(j.matchScore)}
        </div>
        <div class="job-company">${j.company}</div>
        <div class="job-meta">
          <span class="source-tag">${j.source||'?'}</span>
          <span>${j.location||''}</span>
        </div>
      </div>
      <span class="status-badge ${statusClass(j.status)}">${(j.status||'').replace('_',' ')}</span>
    </div>`;
}

function scoreChip(score) {
  if (!score) return '';
  const cls = score >= 75 ? 'score-high' : score >= 60 ? 'score-mid' : 'score-low';
  return `<span class="score-pill ${cls}">${score}%</span>`;
}

function statusClass(s) {
  const m = { DISCOVERED:'s-discovered', ANALYZED:'s-analyzed', PENDING_REVIEW:'s-pending',
    APPLIED:'s-applied', SCORE_TOO_LOW:'s-low', FAILED:'s-failed', RESUME_TAILORED:'s-analyzed' };
  return m[s] || 's-discovered';
}

function statusColor(s) {
  const m = { APPLIED:'#4ade80', PENDING_REVIEW:'#f59e0b', ANALYZED:'#6c63ff',
    DISCOVERED:'#6b7280', SCORE_TOO_LOW:'#f87171', FAILED:'#f87171' };
  return m[s] || '#6b7280';
}

function toast(msg, type = 'info') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'·'}</span> ${msg}`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Init ──────────────────────────────────────────────────────────────────

checkApiHealth();
setInterval(checkApiHealth, 15000);
refreshData();
setInterval(refreshData, 30000);
</script>
</body>
</html>
